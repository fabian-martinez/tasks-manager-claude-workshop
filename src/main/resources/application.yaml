spring:
  application:
    name: task-manager-api

  # Database Configuration (H2 in-memory)
  datasource:
    url: jdbc:h2:mem:taskmanager
    driver-class-name: org.h2.Driver
    username: sa
    password: password

  # H2 Console (for development)
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  # JPA Configuration
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    defer-datasource-initialization: true

  # SQL initialization
  sql:
    init:
      mode: always
      data-locations: classpath:data.sql
      encoding: UTF-8

  # Mail Configuration (for Story 2 - Notifications)
  mail:
    host: localhost
    port: 1025
    username:
    password:
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
        debug: false

  # Security Configuration
  security:
    user:
      name: admin
      password: admin123
      roles: ADMIN

# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always

# Logging Configuration
logging:
  level:
    com.workshop.taskmanager: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/task-manager.log

# Management endpoints (Actuator)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

# Application Configuration
app:
  name: Task Manager API
  version: 1.0.0
  description: Demo application for Claude Code Workshop

  # JWT Configuration (for Story 4 - Authentication)
  jwt:
    secret: mySecretKey123456789012345678901234567890
    expiration: 86400000 # 24 hours in milliseconds

  # Notification Configuration (for Story 2)
  notification:
    enabled: true
    email:
      from: noreply@taskmanager.com
      templates:
        task-assigned: "Task '{{taskTitle}}' has been assigned to you"
        status-changed: "Task '{{taskTitle}}' status changed to {{newStatus}}"

  # Pagination Configuration
  pagination:
    default-page-size: 20
    max-page-size: 100

  # CORS Configuration
  cors:
    allowed-origins: http://localhost:3000

# API Documentation (OpenAPI/Swagger will be added later if needed)
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

---
# Development Profile
spring:
  config:
    activate:
      on-profile: dev

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.workshop.taskmanager: DEBUG
    org.springframework.security: DEBUG

---
# Production Profile
spring:
  config:
    activate:
      on-profile: prod

  jpa:
    show-sql: false

  h2:
    console:
      enabled: false

logging:
  level:
    com.workshop.taskmanager: INFO
    root: WARN